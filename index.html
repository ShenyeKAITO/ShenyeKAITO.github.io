<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>消失的对皮？</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      width: 100%;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #0d0d1a;
      color: #eee;
    }

    .page-index {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0d0d1a;
      padding: 40px 20px;
      text-align: center;
    }

    .content {
      max-width: 600px;
    }

    .title {
      font-size: 52px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 48px;
      letter-spacing: 6px;
    }

    .intro {
      font-size: 16px;
      line-height: 2;
      color: #a0a0b0;
      margin-bottom: 48px;
      padding: 0 20px;
    }

    .btn-start {
      background: #e94560;
      color: #fff;
      padding: 16px 60px;
      font-size: 20px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      letter-spacing: 4px;
      font-family: inherit;
      transition: background 0.3s, transform 0.3s;
    }

    .btn-start:hover {
      background: #ff6b81;
      transform: translateY(-2px);
    }

    @media (max-width: 480px) {
      .title { font-size: 36px; letter-spacing: 4px; }
      .intro { font-size: 14px; }
      .btn-start { padding: 14px 40px; font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page-index">
    <div class="content">
      <h1 class="title">消失的对皮？</h1>
      <div class="intro">
        <p>你是一个大三学生，沉迷于blc的语擦女。</p>
        <p>最近好不容易d到一个随时在线的对皮，</p>
        <p>一切都很顺利。</p>
        <p>&nbsp;</p>
        <p>直到上周，她说有点事，下线后再也没出现过。</p>
        <p>&nbsp;</p>
        <p>她到底去了哪里？</p>
      </div>
      <button class="btn-start" id="startBtn">开始游戏</button>
    </div>
  </div>

  <script>
    // 确保 GameState 加载成功，否则兜底
    function initGameState() {
      if (typeof GameState !== 'undefined' && GameState.init) {
        GameState.init();
        if (!GameState.get('gameStarted')) {
          GameState.set('gameStarted', true);
          GameState.unlockPage('chat_private');
        }
      }
    }

    document.getElementById('startBtn').addEventListener('click', function() {
      initGameState();
      var win = window.open('chat_private.html', '_blank');
      if (!win) {
        alert('弹窗被浏览器拦截了！请允许此网站弹窗，或直接点此链接：\n\n👉 chat_private.html');
      }
    });
  </script>
  <script src="shared/game-state.js"></script>
</body>
</html>
