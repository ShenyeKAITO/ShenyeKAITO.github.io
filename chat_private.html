<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>私聊 · 消失的对皮？</title>
  <link rel="stylesheet" href="shared/style.css">
  <script src="shared/game-state.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1e1e2e;
      font-family: var(--font-main);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ===== 电脑窗口 ===== */
    .window-frame {
      width: 100%;
      max-width: 820px;
      height: 100vh;
      max-height: 720px;
      background: #f5f5f5;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 60px rgba(0,0,0,0.5);
      position: relative;
    }

    /* ===== 窗口标题栏 ===== */
    .window-titlebar {
      background: #e6e6e6;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      user-select: none;
      border-bottom: 1px solid #d0d0d0;
    }

    .window-titlebar .title-text {
      font-size: 13px;
      color: #444;
      font-weight: 500;
    }

    .window-titlebar .win-controls {
      display: flex;
      gap: 6px;
    }

    .window-titlebar .win-controls span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .win-controls .btn-close { background: #e94560; }
    .win-controls .btn-min { background: #f0c040; }
    .win-controls .btn-max { background: #60c060; }

    /* ===== 聊天主体 ===== */
    .chat-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ===== 左侧面板 ===== */
    .side-panel {
      width: 160px;
      background: #e8e8e8;
      border-right: 1px solid #d0d0d0;
      display: flex;
      flex-direction: column;
      padding: 20px 12px;
      flex-shrink: 0;
    }

    .side-panel .big-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-image: url('shared/avatar.png');
      margin: 0 auto 12px;
    }

    .side-panel .side-name {
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
    }

    .side-panel .side-status {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-bottom: 16px;
    }

    .side-panel .side-info {
      font-size: 12px;
      color: #888;
      line-height: 1.8;
      padding: 12px 0;
      border-top: 1px solid #d0d0d0;
    }

    /* ===== 右侧聊天区 ===== */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .chat-header {
      background: #fff;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }

    .chat-header .name-title {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }

    .chat-header .menu-btn {
      font-size: 16px;
      color: #333;
      cursor: pointer;
      padding: 4px;
      margin-left: auto;
    }

    /* ===== 聊天区域 ===== */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
    }

    /* ===== 消息行 ===== */
    .message-row {
      display: flex;
      margin-bottom: 14px;
      animation: msgIn 0.3s ease-out;
      max-width: 100%;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-row.received {
      justify-content: flex-start;
    }

    .message-row.sent {
      justify-content: flex-end;
    }

    /* ===== 头像 ===== */
    .msg-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .msg-avatar.npc-avatar {
      background-image: url('shared/avatar.png');
    }

    .msg-avatar.my-avatar {
      background-image: url('shared/my-avatar.jpg');
    }

    .message-row.received .msg-avatar {
      margin-right: 8px;
    }

    .message-row.sent .msg-avatar {
      margin-left: 8px;
      order: 1;
    }

    /* ===== 消息内容 ===== */
    .msg-content {
      display: flex;
      flex-direction: column;
      max-width: 75%;
    }

    .message-row.sent .msg-content {
      align-items: flex-end;
    }

    .message-row.received .msg-content {
      align-items: flex-start;
    }

    /* ===== 气泡 ===== */
    .bubble {
      padding: 10px 16px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.6;
      word-break: break-word;
      position: relative;
    }

    .message-row.received .bubble {
      background: #fff;
      color: #333;
      border-bottom-left-radius: 4px;
    }

    .message-row.sent .bubble {
      background: #c6e6f7;
      color: #333;
      border-bottom-right-radius: 4px;
    }

    .message-row .time {
      font-size: 10px;
      color: #b0b0b0;
      margin-top: 4px;
      padding: 0 4px;
    }

    .message-row.received .time {
      align-self: flex-start;
    }

    .message-row.sent .time {
      align-self: flex-end;
    }

    /* ===== 日期分隔线 ===== */
    .date-divider {
      text-align: center;
      font-size: 12px;
      color: #b0b0b0;
      margin: 16px 0;
      position: relative;
    }

    .date-divider span {
      background: #e8e8e8;
      padding: 3px 14px;
      border-radius: 10px;
      font-size: 11px;
    }

    /* ===== 失败消息 ===== */
    .message-row.failed .bubble {
      opacity: 0.8;
    }

    .message-row .fail-hint {
      font-size: 11px;
      color: #e94560;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .message-row .fail-hint .red-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #e94560;
      flex-shrink: 0;
    }

    /* ===== "进入我的QQ" 链接 ===== */
    .next-link {
      font-size: 14px;
      color: #2196F3;
      margin: 16px 0 8px;
      cursor: pointer;
      text-align: center;
      transition: color 0.2s;
      user-select: text;
      animation: msgIn 0.4s ease-out;
    }

    .next-link:hover {
      color: #1976D2;
      text-decoration: underline;
    }

    /* ===== "正在输入..." ===== */
    .typing-indicator-row {
      display: none;
      margin-bottom: 14px;
      align-items: center;
      margin-left: 44px;
    }

    .typing-indicator-row.visible {
      display: flex;
    }

    .typing-indicator-row .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #bbb;
      animation: typingDot 1.4s infinite ease-in-out;
    }

    .typing-indicator-row .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator-row .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingDot {
      0%, 60%, 100% { opacity: 0.3; transform: scale(1); }
      30% { opacity: 1; transform: scale(1.2); }
    }

    /* ===== 底部输入区（新版：真实输入框） ===== */
    .chat-input-bar {
      background: #fff;
      border-top: 1px solid #e0e0e0;
      padding: 10px 16px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-input-bar input {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid #d0d0d0;
      border-radius: 20px;
      font-size: 14px;
      font-family: var(--font-main);
      outline: none;
      background: #f8f8f8;
      transition: border 0.2s, background 0.2s;
    }

    .chat-input-bar input:focus {
      border-color: #a8d8f0;
      background: #fff;
    }

    .chat-input-bar input::placeholder {
      color: #bbb;
    }

    .chat-input-bar .send-btn {
      padding: 8px 22px;
      background: #ddd;
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
      font-family: var(--font-main);
    }

    .chat-input-bar .send-btn.active {
      background: #2196F3;
    }

    .chat-input-bar .send-btn.active:hover {
      background: #1976D2;
    }

    .chat-input-bar .send-btn:disabled {
      background: #ddd;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="window-frame">
    <!-- 窗口标题栏 -->
    <div class="window-titlebar">
      <span class="title-text">💬 与 <span id="titlebarName">对皮</span> 的对话</span>
      <span class="win-controls">
        <span class="btn-min"></span>
        <span class="btn-max"></span>
        <span class="btn-close" onclick="closeWindow()"></span>
      </span>
    </div>

    <!-- 聊天主体 -->
    <div class="chat-body">
      <!-- 左侧面板 -->
      <div class="side-panel">
        <div class="big-avatar" id="npcBigAvatar"></div>
        <div class="side-name" id="npcSideName">对皮</div>
        <div class="side-status" id="npcSideStatus">离线</div>
        <div class="side-info">
          <div>个性签名：或是沙灘裡的碎石和人生</div>
        </div>
      </div>

      <!-- 右侧聊天 -->
      <div class="chat-main">
        <div class="chat-header">
          <span class="name-title" id="chatHeaderName">对皮</span>
          <span class="menu-btn">⋯</span>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-area" id="chatArea"></div>

        <!-- "正在输入..." -->
        <div class="typing-indicator-row" id="typingIndicator">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>

        <!-- 底部输入区 -->
        <div class="chat-input-bar" id="inputBar">
          <input type="text" id="chatInput" placeholder="输入消息..." disabled>
          <button class="send-btn" id="sendBtn" disabled>发送</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    GameState.init();

    // ===== 判断入口：只有从消息列表点进来才是静态模式 =====
    const isStaticMode = GameState.get('fromMessageList') === true;
    if (isStaticMode) GameState.set('fromMessageList', false);

    // ===== 等你来填 =====
    const NPC_NAME = '谢砚';

    // ===== 历史消息 =====
    const HISTORY = [
      {
        date: '6月21日',
        messages: [
          { type: 'received', text: '低睫拢掌燃烟吮吐喷洒人面，指掐颊烙红痕恶劣扬笑。想哥没？' },
          { type: 'sent', text: '眼睫垂、落眄于唇欲吻，泄半抹春思，面染红翡按捺心头痒意，乖顺贴掌去，轻轻言。哥你这么久去哪了？我好想你。' },
          { type: 'received', text: '掷地足碾灭烟，扇掌驱烟味，眉梢扬起，伸臂揽怀，耳边洒下温热气息，笑脸上带着戏谑。很听话，想要我怎么奖励你，乖小狗。' },
          { type: 'sent', text: '忽然拉近的距离、称呼惹得谢砚耳后连颈红成一片，笑吟吟挑弯眼尾，勾颈仰颅亲昵落吻下颚。哥亲亲我就好了。' },
          { type: 'received', text: '好孩子。宽掌下滑臀肉揉捏，另掌掐喉束缚，犬齿咬唇厮磨舌撬齿列滑入狠戾夺氧贪吮，分离卷津吞咽调侃。沈屿，怎么都忘记呼吸了？' },
          { type: 'sent', text: '唇肉钝痛只怕是破了层皮，腻舌灵巧勾缠渐缺氧面部涨红，粗喘平复胸膛起伏，抿唇成线羞恼于他这副做派。哥你总咬人，属狗的吗？' },
          { type: 'received', text: '有点事，弧了' },
        ]
      },
      {
        date: '6月22日',
        messages: [
          { type: 'sent', text: '哥，好想你' },
          { type: 'sent', text: '怎么今天都没给我发消息' },
        ]
      },
      {
        date: '6月23日',
        messages: [
          { type: 'sent', text: '哥哥？' },
        ]
      },
      {
        date: '6月25日',
        messages: [
          { type: 'sent', text: '怎么不理我，出什么事了吗？' },
        ]
      },
      {
        date: '6月27日',
        messages: [
          { type: 'sent', text: '？', isFailed: true },
        ]
      },
    ];

    // ===== 预设输入文字 =====
    const PRESET_TEXTS = [
      '眼睫垂、落眄于唇欲吻，泄半抹春思，面染红翡按捺心头痒意，乖顺贴掌去，轻轻言。哥你这么久去哪了？我好想你。',
      '忽然拉近的距离、称呼惹得谢砚耳后连颈红成一片，笑吟吟挑弯眼尾，勾颈仰颅亲昵落吻下颚。哥亲亲我就好了。',
      '唇肉钝痛只怕是破了层皮，腻舌灵巧勾缠渐缺氧面部涨红，粗喘平复胸膛起伏，抿唇成线羞恼于他这副做派。哥你总咬人，属狗的吗？',
      '哥，好想你',
      '怎么今天都没给我发消息',
      '哥哥？',
      '怎么不理我，出什么事了吗？',
      '？',
    ];

    // ===== 交互核心 =====

    let isPlaying = false;
    let isGone = false;
    let currentDayIdx = 0;
    let currentMsgIdx = 0;
    let presetIndex = 0;
    let waitingForInput = false;     // 是否在等玩家输入
    let playStarted = false;

    // ===== 时间工具 =====
    function getTimeStr() {
      const now = new Date();
      return String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
    }

    function getRandomTime() {
      const h = Math.floor(Math.random() * 10) + 8;
      const m = Math.floor(Math.random() * 60);
      return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
    }

    // ===== 渲染一条消息（已发送的消息不可选中/删除） =====
    function addMessage(msg, timeOverride) {
      const area = document.getElementById('chatArea');

      const row = document.createElement('div');
      const isReceived = msg.type === 'received';
      row.className = 'message-row ' + (isReceived ? 'received' : 'sent');
      if (msg.isFailed) row.classList.add('failed');
      // 已发出的消息不可选中 — 去掉限制，允许复制
      row.style.userSelect = 'text';

      let html = '';
      // 双方都显示头像
      const avatarClass = isReceived ? 'npc-avatar' : 'my-avatar';
      html += '<div class="msg-avatar ' + avatarClass + '" style="user-select:text;"></div>';

      html += '<div class="msg-content">';
      html += '<div class="bubble">';
      if (msg.isFailed) html += '<span>⚠ </span>';
      html += msg.text + '</div>';

      // isFailed 的消息显示拒收红字
      if (msg.isFailed) {
        html += '<div class="fail-hint"><span class="red-dot"></span> 消息被对方拒收</div>';
      }

      html += '</div>';

      // 拒收消息发送后延迟出现"进入我的QQ"
      if (msg.isFailed && !isStaticMode) {
        setTimeout(() => {
          const area = document.getElementById('chatArea');
          const linkDiv = document.createElement('div');
          linkDiv.className = 'next-link';
          linkDiv.textContent = '→ 进入我的QQ';
          linkDiv.onclick = function() { goToMessageList(); };
          area.appendChild(linkDiv);
          scrollToBottom();
        }, 1200);
      }
      row.innerHTML = html;
      area.appendChild(row);
      scrollToBottom();
    }

    function addDateDivider(dateText) {
      const area = document.getElementById('chatArea');
      const div = document.createElement('div');
      div.className = 'date-divider';
      div.innerHTML = '<span>' + dateText + '</span>';
      area.appendChild(div);
      scrollToBottom();
    }

    function scrollToBottom() {
      const area = document.getElementById('chatArea');
      setTimeout(() => { area.scrollTop = area.scrollHeight; }, 30);
    }

    function showTyping() {
      document.getElementById('typingIndicator').classList.add('visible');
      scrollToBottom();
    }

    function hideTyping() {
      document.getElementById('typingIndicator').classList.remove('visible');
    }

    // ===== 播放下一条消息 =====
    function playNext() {
      if (isGone) return;

      // 跳过已经过去的日期
      while (currentDayIdx < HISTORY.length && currentMsgIdx >= HISTORY[currentDayIdx].messages.length) {
        currentDayIdx++;
        currentMsgIdx = 0;
        if (currentDayIdx >= HISTORY.length) {
          // 所有历史播完了
          return;
        }
        addDateDivider(HISTORY[currentDayIdx].date);
      }

      if (currentDayIdx >= HISTORY.length) return;

      const msg = HISTORY[currentDayIdx].messages[currentMsgIdx];
      const time = getRandomTime();
      currentMsgIdx++;

      if (msg.type === 'received') {
        // 对方消息：打字动画 → 自动显示
        showTyping();
        setTimeout(() => {
          hideTyping();
          addMessage(msg, time);
          // 延迟后播下一条
          setTimeout(playNext, 500 + Math.random() * 300);
        }, 1000 + Math.random() * 600);
      } else {
        // 我方消息：停住，等玩家输入
        waitingForInput = true;
        activateInputForCurrentMessage();
      }
    }

    // ===== 激活输入框，等待发送当前消息（摆设模式：只能点，不能键入） =====
    function activateInputForCurrentMessage() {
      const input = document.getElementById('chatInput');
      const sendBtn = document.getElementById('sendBtn');

      input.disabled = false;
      sendBtn.disabled = false;
      input.placeholder = '输入消息...';
      input.value = '';
      sendBtn.classList.remove('active');

      // 先移除旧监听，避免重复绑定
      const newInput = input.cloneNode(true);
      input.parentNode.replaceChild(newInput, input);
      const newSendBtn = sendBtn.cloneNode(true);
      sendBtn.parentNode.replaceChild(newSendBtn, sendBtn);

      const finalInput = document.getElementById('chatInput');
      const finalSendBtn = document.getElementById('sendBtn');

      let hasClicked = false;

      // 阻止键盘输入——玩家不能自己打字
      finalInput.addEventListener('keydown', function(e) {
        e.preventDefault();
        return false;
      });

      finalInput.addEventListener('input', function(e) {
        // 如果不是预设填入的，清掉
        if (!hasClicked) {
          this.value = '';
          finalSendBtn.classList.remove('active');
        }
      });

      // 点击输入框 → 填入预设文字
      finalInput.addEventListener('click', function onClick() {
        if (presetIndex < PRESET_TEXTS.length && !hasClicked && waitingForInput) {
          this.value = PRESET_TEXTS[presetIndex];
          hasClicked = true;
          finalSendBtn.classList.add('active');
        }
      });

      function handleSend() {
        if (isGone || !waitingForInput) return;
        const text = finalInput.value.trim();
        if (!text) return;

        if (presetIndex < PRESET_TEXTS.length && text === PRESET_TEXTS[presetIndex]) {
          finalInput.value = '';
          waitingForInput = false;
          finalInput.disabled = true;
          finalSendBtn.disabled = true;
          finalSendBtn.classList.remove('active');

          const time = getTimeStr();
          // 检查这条消息在 HISTORY 中是否标记为 isFailed
          const isFailed = HISTORY[currentDayIdx]?.messages[currentMsgIdx - 1]?.isFailed === true;
          addMessage({ type: 'sent', text: text, isFailed: isFailed }, time);
          presetIndex++;

          // 检查是不是最后一条
          const isLast = (
            currentDayIdx >= HISTORY.length - 1 &&
            currentMsgIdx >= HISTORY[currentDayIdx]?.messages?.length
          );

          if (isLast) {
            GameState.set('chatFinished', true);
            return;
          }

          setTimeout(playNext, 600 + Math.random() * 400);
        }
      }

      finalSendBtn.addEventListener('click', handleSend);
    }

    // ===== 进入消息列表 =====
    function goToMessageList() {
      GameState.unlockPage('message_list');
      window.open('message_list.html', '_blank');
    }

    // ===== 开始播放 =====
    function startPlayback() {
      if (playStarted) return;
      playStarted = true;

      // 先显示6/21的日期
      if (HISTORY.length > 0) {
        addDateDivider(HISTORY[0].date);
      }

      setTimeout(playNext, 800);
    }

    // ===== 消失覆盖层 =====
    function showGoneOverlay() {
      isGone = true;
      document.getElementById('npcSideStatus').textContent = '离线';
      document.getElementById('goneOverlay').classList.add('visible');
    }

    // ===== 启动 =====
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('npcSideName').textContent = NPC_NAME;
      document.getElementById('chatHeaderName').textContent = NPC_NAME;
      document.getElementById('titlebarName').textContent = NPC_NAME;

      if (isStaticMode) {
        // 从消息列表点进来的：静态展示所有历史，不可互动
        document.getElementById('npcSideStatus').textContent = '离线';
        document.getElementById('chatInput').placeholder = '对方已离线';
        document.getElementById('sendBtn').disabled = true;

        for (const day of HISTORY) {
          addDateDivider(day.date);
          for (const msg of day.messages) {
            addMessage(msg);
          }
        }

        const area = document.getElementById('chatArea');
        const delNotice = document.createElement('div');
        delNotice.style.cssText = 'text-align:center;font-size:12px;color:#999;margin:12px 0 8px;user-select:text;animation:msgIn 0.4s ease-out;';
        delNotice.textContent = '—— 对方已离线，无法发送消息 ——';
        area.appendChild(delNotice);
        scrollToBottom();
        return;
      }

      // 从开始游戏进来的：保留原有交互
      if (GameState.get('chatFinished')) {
        GameState.clearFinished();
      }

      startPlayback();
    });
  </script>
</body>
</html>
