<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>谢砚 · 与空友B的对话 · 消失的对皮？</title>
  <link rel="stylesheet" href="shared/style.css">
  <script src="shared/game-state.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #1e1e2e;
      font-family: var(--font-main);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .window-frame {
      width: 100%;
      max-width: 820px;
      height: 100vh;
      max-height: 720px;
      background: #f5f5f5;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 60px rgba(0,0,0,0.5);
    }
    .window-titlebar {
      background: #e6e6e6;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      user-select: none;
      border-bottom: 1px solid #d0d0d0;
    }
    .window-titlebar .title-text { font-size:13px; color:#444; font-weight:500; }
    .window-titlebar .win-controls { display:flex; gap:6px; }
    .window-titlebar .win-controls span { width:12px; height:12px; border-radius:50%; display:inline-block; }
    .win-controls .btn-close { background:#e94560; }
    .win-controls .btn-min { background:#f0c040; }
    .win-controls .btn-max { background:#60c060; }
    .chat-body { display:flex; flex:1; overflow:hidden; }
    .side-panel {
      width:160px; background:#e8e8e8; border-right:1px solid #d0d0d0;
      display:flex; flex-direction:column; padding:20px 12px; flex-shrink:0;
    }
    .side-panel .big-avatar {
      width:64px; height:64px; border-radius:50%; flex-shrink:0;
      margin:0 auto 12px;
      display:flex; align-items:center; justify-content:center;
      font-size:20px; font-weight:700; color:#fff;
    }
    .side-panel .side-name { text-align:center; font-size:16px; font-weight:600; color:#333; margin-bottom:4px; }
    .side-panel .side-status { text-align:center; font-size:12px; color:#999; margin-bottom:16px; }
    .side-panel .side-info {
      font-size:12px; color:#888; line-height:1.8;
      padding:12px 0; border-top:1px solid #d0d0d0;
    }
    .chat-main { flex:1; display:flex; flex-direction:column; min-width:0; }
    .chat-header {
      background:#fff; padding:10px 16px; display:flex; align-items:center;
      border-bottom:1px solid #e0e0e0; flex-shrink:0;
    }
    .chat-header .name-title { font-size:14px; font-weight:600; color:#333; }
    .chat-header .menu-btn { font-size:16px; color:#333; cursor:pointer; padding:4px; margin-left:auto; }
    .chat-area {
      flex:1; overflow-y:auto; padding:16px 20px; background:#f0f0f0; display:flex; flex-direction:column;
    }
    .message-row {
      display:flex; margin-bottom:14px; animation:msgIn 0.3s ease-out; max-width:100%;
    }
    @keyframes msgIn {
      from { opacity:0; transform:translateY(8px); }
      to { opacity:1; transform:translateY(0); }
    }
    .message-row.received { justify-content:flex-start; }
    .message-row.sent { justify-content:flex-end; }
    .msg-avatar {
      width:36px; height:36px; border-radius:50%; flex-shrink:0;
      background-size:cover; background-position:center; background-repeat:no-repeat;
      display:flex; align-items:center; justify-content:center;
      font-size:16px; font-weight:600; color:#fff;
    }
    .msg-avatar.my-avatar { background-image:url('shared/avatar.png'); }
    .message-row.received .msg-avatar { margin-right:8px; }
    .message-row.sent .msg-avatar { margin-left:8px; order:1; }
    .msg-content { display:flex; flex-direction:column; max-width:75%; }
    .message-row.sent .msg-content { align-items:flex-end; }
    .message-row.received .msg-content { align-items:flex-start; }
    .bubble {
      padding:10px 16px; border-radius:16px; font-size:15px;
      line-height:1.6; word-break:break-word; position:relative;
    }
    .message-row.received .bubble { background:#fff; color:#333; border-bottom-left-radius:4px; }
    .message-row.sent .bubble { background:#c6e6f7; color:#333; border-bottom-right-radius:4px; }
    .date-divider {
      text-align:center; font-size:12px; color:#b0b0b0; margin:16px 0; position:relative;
    }
    .date-divider span { background:#e8e8e8; padding:3px 14px; border-radius:10px; font-size:11px; }
    .chat-input-bar {
      background:#fff; border-top:1px solid #e0e0e0; padding:10px 16px;
      flex-shrink:0; display:flex; align-items:center; gap:10px;
    }
    .chat-input-bar input {
      flex:1; padding:10px 16px; border:1px solid #d0d0d0; border-radius:20px;
      font-size:14px; font-family:var(--font-main); outline:none; background:#f8f8f8;
    }
    .chat-input-bar input::placeholder { color:#bbb; }
    .chat-input-bar .send-btn {
      padding:8px 22px; background:#ddd; color:#fff; border:none;
      border-radius:20px; font-size:14px; font-family:var(--font-main); cursor:not-allowed;
    }
  </style>
</head>
<body>
  <div class="window-frame">
    <div class="window-titlebar">
      <span class="title-text">💬 与 空友B 的对话</span>
      <span class="win-controls">
        <span class="btn-min"></span>
        <span class="btn-max"></span>
        <span class="btn-close" onclick="window.close()"></span>
      </span>
    </div>
    <div class="chat-body">
      <div class="side-panel">
        <div class="big-avatar" style="background:#d63031;">B</div>
        <div class="side-name">空友B</div>
        <div class="side-status">离线</div>
        <div class="side-info">
          <div>个性签名：。</div>
        </div>
      </div>
      <div class="chat-main">
        <div class="chat-header">
          <span class="name-title">空友B</span>
          <span class="menu-btn">⋯</span>
        </div>
        <div class="chat-area" id="chatArea"></div>
        <div class="chat-input-bar">
          <input type="text" id="chatInput" placeholder="输入消息..." autocomplete="off">
          <button class="send-btn" id="sendBtn" disabled>发送</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    GameState.init();

    const CONVERSATION = [
      {
        date: '6月10日',
        messages: [
          { type: 'received', text: '老师你好！恭喜你中了反818那条的转抽🎉是50r，老师给个收款码吧' },
          { type: 'sent', text: '好幸运，谢谢' },
          { type: 'sent', isImage: true, text: '收款码', src: '8.jpg' },
          { type: 'received', isImage: true, text: '转账截图', src: '', label: '微信转账 · **雯' },
        ]
      },
    ];

    function addMessage(msg) {
      const area = document.getElementById('chatArea');
      const row = document.createElement('div');
      row.className = 'message-row ' + (msg.type === 'received' ? 'received' : 'sent');
      row.style.userSelect = 'text';
      const isReceived = msg.type === 'received';
      let html = '';
      if (isReceived) {
        html += '<div class="msg-avatar" style="background:#d63031;">B</div>';
      } else {
        html += '<div class="msg-avatar my-avatar"></div>';
      }
      if (msg.isImage) {
        if (msg.src) {
          html += '<div class="msg-content"><div class="bubble" style="padding:8px;text-align:center;background:#f8f9fc;"><img src="' + msg.src + '" style="max-width:180px;border-radius:6px;display:block;"></div></div>';
        } else {
          html += '<div class="msg-content"><div class="bubble" style="background:linear-gradient(135deg,#e8f5e9,#c8e6c9);border:1px solid #a5d6a7;padding:20px 24px;text-align:center;min-width:160px;"><div style="font-size:13px;color:#999;">' + (msg.label || msg.text) + '</div></div></div>';
        }
      } else {
        html += '<div class="msg-content"><div class="bubble">' + msg.text + '</div></div>';
      }
      row.innerHTML = html;
      document.getElementById('chatArea').appendChild(row);
    }

    function addDateDivider(dateText) {
      const div = document.createElement('div');
      div.className = 'date-divider';
      div.innerHTML = '<span>' + dateText + '</span>';
      document.getElementById('chatArea').appendChild(div);
    }

    for (const day of CONVERSATION) {
      addDateDivider(day.date);
      for (const msg of day.messages) {
        addMessage(msg);
      }
    }

    setTimeout(() => { document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight; }, 50);

    const sendBtn = document.getElementById('sendBtn');
    sendBtn.addEventListener('click', function(e) { e.preventDefault(); });
    document.getElementById('chatInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') e.preventDefault();
    });
  </script>
</body>
</html>
