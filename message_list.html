<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>消息列表 · 消失的对皮？</title>
  <link rel="stylesheet" href="shared/style.css">
  <script src="shared/game-state.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1e1e2e;
      font-family: var(--font-main);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .window-frame {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      max-height: 700px;
      background: #f5f5f5;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 60px rgba(0,0,0,0.5);
    }

    /* ===== 顶部栏 ===== */
    .header {
      background: #fff;
      padding: 14px 16px;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }

    .header .title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }

    .header .subtitle {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }

    /* ===== 搜索栏 ===== */
    .search-bar {
      background: #fff;
      padding: 8px 16px;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }

    .search-bar input {
      width: 100%;
      padding: 8px 14px;
      border: none;
      border-radius: 20px;
      background: #f0f0f0;
      font-size: 13px;
      font-family: var(--font-main);
      outline: none;
    }

    /* ===== 消息列表 ===== */
    .msg-list {
      flex: 1;
      overflow-y: auto;
      background: #fff;
    }

    .msg-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      color: inherit;
    }

    .msg-item:hover {
      background: #f8f8f8;
    }

    .msg-item .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-right: 12px;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .msg-item .info {
      flex: 1;
      min-width: 0;
    }

    .msg-item .info .name-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .msg-item .info .name-row .name {
      font-size: 15px;
      font-weight: 600;
      color: #333;
    }

    .msg-item .info .name-row .time {
      font-size: 11px;
      color: #b0b0b0;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .msg-item .info .preview {
      font-size: 13px;
      color: #999;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .msg-item .badge {
      background: #e94560;
      color: #fff;
      font-size: 11px;
      min-width: 20px;
      height: 20px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
      margin-left: 8px;
      flex-shrink: 0;
    }

    /* ===== 底部导航 ===== */
    .bottom-nav {
      display: flex;
      border-top: 1px solid #e0e0e0;
      background: #fff;
      flex-shrink: 0;
    }

    .bottom-nav .nav-item {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      font-size: 11px;
      color: #999;
      cursor: pointer;
      transition: color 0.2s;
    }

    .bottom-nav .nav-item.active {
      color: #2196F3;
    }

    .bottom-nav .nav-item .nav-icon {
      font-size: 18px;
      display: block;
      margin-bottom: 2px;
    }
  </style>
</head>
<body>
  <div class="window-frame">
    <!-- 顶部 -->
    <div class="header">
      <div class="title">QQ</div>
      <div class="subtitle">消息</div>
    </div>

    <!-- 页面提示 -->
    <div style="text-align:center;padding:16px 16px 8px;font-size:16px;color:#e94560;font-weight:600;flex-shrink:0;background:transparent;letter-spacing:1px;">⚠️ 提示：此页面不要关闭</div>

    <!-- 搜索 -->
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="搜索联系人、群聊…" autocomplete="off" name="randomsearch_nofill">
    </div>

    <!-- 消息列表 -->
    <div class="msg-list" id="msgList">
      <!-- 对皮（已离线） -->
      <a class="msg-item" onclick="GameState.set('fromMessageList', true); window.open('chat_private.html', '_blank');">
        <div class="avatar" style="background-image:url('shared/avatar.png'); opacity:0.5;"></div>
        <div class="info">
          <div class="name-row">
            <span class="name" style="color:#999;">谢砚</span>
            <span class="time">6月27日</span>
          </div>
          <div class="preview" style="color:#ccc;">[离线] 消息已发出，但被对方拒收</div>
        </div>
        <div class="badge">!</div>
      </a>

      <!-- 谢砚亲友 -->
      <a class="msg-item" onclick="window.open('chat_friend1.html', '_blank')">
        <div class="avatar" style="background:#002FA7;"></div>
        <div class="info">
          <div class="name-row">
            <span class="name">谢砚亲友</span>
            <span class="time">6月27日</span>
          </div>
          <div class="preview">好，知道了，谢谢你</div>
        </div>
      </a>

      <!-- 群聊1 -->
      <a class="msg-item" onclick="window.open('chat_group1.html', '_blank')">
        <div class="avatar" style="background:#ff9ff3; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:18px; color:#fff;">💔</div>
        <div class="info">
          <div class="name-row">
            <span class="name">语擦女的人生注定是可悲的人生 <span style="font-size:11px;color:#bbb;font-weight:400;">(4)</span></span>
            <span class="time">6月27日</span>
          </div>
          <div class="preview">沈屿：我试试吧</div>
        </div>
      </a>

      <!-- BLC万能局 -->
      <a class="msg-item" onclick="window.open('chat_group2.html', '_blank')">
        <div class="avatar" style="background:#a29bfe; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px;">🎭</div>
        <div class="info">
          <div class="name-row">
            <span class="name">BLC万能局 <span style="font-size:11px;color:#bbb;font-weight:400;">(1999)</span></span>
            <span class="time">6月10日</span>
          </div>
          <div class="preview">代发A：查。【饮血崖】三挂一铁组仅限blc……</div>
        </div>
      </a>

      <!-- 谢砚的个人资料 -->
      <a class="msg-item" onclick="window.open('profile.html', '_blank')">
        <div class="avatar" style="background:#636e72; display:flex; align-items:center; justify-content:center; font-size:18px; color:#fff;">👤</div>
        <div class="info">
          <div class="name-row">
            <span class="name">谢砚的个人资料</span>
            <span class="time">资料</span>
          </div>
          <div class="preview">查看她的个人信息</div>
        </div>
      </a>

      <!-- 关联QQ号 -->
      <a class="msg-item" onclick="window.open('qq_login.html', '_blank')">
        <div class="avatar" style="background:#2196F3; display:flex; align-items:center; justify-content:center; font-size:18px; color:#fff;">🔗</div>
        <div class="info">
          <div class="name-row">
            <span class="name">我的关联QQ号</span>
            <span class="time">关联</span>
          </div>
          <div class="preview">登录关联账号查看更多信息</div>
        </div>
        <div class="badge">!</div>
      </a>
    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav">
      <div class="nav-item active">
        <span class="nav-icon">💬</span>
        消息
      </div>
      <div class="nav-item" onclick="window.open('qzone_feed.html', '_blank')">
        <span class="nav-icon">📱</span>
        空间
      </div>
      <div class="nav-item" style="cursor:default;">
        <span class="nav-icon">👤</span>
        联系人
      </div>
      <div class="nav-item" onclick="window.open('my_profile.html', '_blank')">
        <span class="nav-icon">☰</span>
        我的
      </div>
    </div>
  </div>

  <script>
    GameState.init();
    GameState.unlockPage('message_list');

    // ===== 搜索功能 =====
    const searchInput = document.getElementById('searchInput');
    const msgItems = document.querySelectorAll('.msg-item');

    searchInput.addEventListener('input', function() {
      const keyword = this.value.trim().toLowerCase();

      msgItems.forEach(item => {
        const text = item.textContent.toLowerCase();
        if (text.includes(keyword)) {
          item.style.display = 'flex';
        } else {
          item.style.display = 'none';
        }
      });
    });
  </script>
</body>
</html>
