<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>消息列表 · 消失的对皮？</title>
  <link rel="stylesheet" href="shared/style.css">
  <script src="shared/game-state.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1e1e2e;
      font-family: var(--font-main);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .window-frame {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      max-height: 700px;
      background: #f5f5f5;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 60px rgba(0,0,0,0.5);
    }

    .header {
      background: #fff;
      padding: 14px 16px;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }

    .header .title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header .title .qq-info {
      font-size: 12px;
      font-weight: 400;
      color: #999;
    }

    .header .subtitle {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }

    .msg-list {
      flex: 1;
      overflow-y: auto;
      background: #fff;
    }

    .msg-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.15s;
    }

    .msg-item:hover {
      background: #f8f8f8;
    }

    .msg-item .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-right: 12px;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .msg-item .info {
      flex: 1;
      min-width: 0;
    }

    .msg-item .info .name-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .msg-item .info .name-row .name {
      font-size: 15px;
      font-weight: 600;
      color: #333;
    }

    .msg-item .info .name-row .time {
      font-size: 11px;
      color: #b0b0b0;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .msg-item .info .preview {
      font-size: 13px;
      color: #999;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bottom-nav {
      display: flex;
      border-top: 1px solid #e0e0e0;
      background: #fff;
      flex-shrink: 0;
    }

    .bottom-nav .nav-item {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      font-size: 11px;
      color: #999;
      cursor: pointer;
      transition: color 0.2s;
    }

    .bottom-nav .nav-item.active {
      color: #2196F3;
    }

    .bottom-nav .nav-item .nav-icon {
      font-size: 18px;
      display: block;
      margin-bottom: 2px;
    }

    .switch-account {
      padding: 10px 16px;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
      text-align: center;
    }

    .switch-account span {
      font-size: 12px;
      color: #999;
    }

    /* ===== 搜索栏 ===== */
    .search-bar {
      background: #fff;
      padding: 8px 16px;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }

    .search-bar input {
      width: 100%;
      padding: 8px 14px;
      border: none;
      border-radius: 20px;
      background: #f0f0f0;
      font-size: 13px;
      font-family: var(--font-main);
      outline: none;
    }
  </style>
</head>
<body>
  <div class="window-frame">
    <div class="header">
      <div class="title">
        消息
        <span class="qq-info">｜谢砚 3048627159037</span>
      </div>
      <div class="subtitle">已登录关联账号</div>
    </div>

    <!-- 搜索 -->
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="搜索联系人、群聊…" autocomplete="off" name="randomsearch_nofill">
    </div>

    <div class="msg-list" id="msgList">
      <!-- 消息列表项：谢砚亲友移到最上面 -->
      <div class="msg-item" onclick="window.open('others_chat_friend.html', '_blank')">
        <div class="avatar" style="background:#002FA7;"></div>
        <div class="info">
          <div class="name-row">
            <span class="name">亲友</span>
            <span class="time" id="chatTimeFriend">这里填时间</span>
          </div>
          <div class="preview" id="chatPreviewFriend">这里填最后一条消息预览</div>
        </div>
      </div>

      <!-- 沈屿 -->
      <div class="msg-item" onclick="window.open('others_chat.html', '_blank')">
        <div class="avatar" style="background-image:url('shared/my-avatar.jpg');"></div>
        <div class="info">
          <div class="name-row">
            <span class="name">沈屿</span>
            <span class="time" id="chatTime1">这里填时间</span>
          </div>
          <div class="preview" id="chatPreview1">这里填最后一条消息预览</div>
        </div>
      </div>

      <!-- 空友B -->
      <div class="msg-item" onclick="window.open('others_chat_friend2.html', '_blank')">
        <div class="avatar" style="background:#d63031; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:600; color:#fff;">B</div>
        <div class="info">
          <div class="name-row">
            <span class="name">空友B</span>
            <span class="time" id="chatTimeB">6月10日</span>
          </div>
          <div class="preview" id="chatPreviewB">空友B：微信转账 · **雯</div>
        </div>
      </div>

      <div class="msg-item" onclick="window.open('others_chat_group.html', '_blank')">
        <div class="avatar" style="background:#a29bfe; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px;">🎭</div>
        <div class="info">
          <div class="name-row">
            <span class="name">BLC万能局 <span style="font-size:11px;color:#bbb;font-weight:400;">(1999)</span></span>
            <span class="time" id="groupTime">这里填时间</span>
          </div>
          <div class="preview" id="groupPreview">这里填群消息预览</div>
        </div>
      </div>
    </div>

    <div class="bottom-nav">
      <div class="nav-item active">
        <span class="nav-icon">💬</span>
        消息
      </div>
      <div class="nav-item" onclick="window.open('others_qzone.html', '_blank')">
        <span class="nav-icon">📱</span>
        空间
      </div>
      <div class="nav-item" style="cursor:default;">
        <span class="nav-icon">👤</span>
        联系人
      </div>
      <div class="nav-item" style="cursor:default;">
        <span class="nav-icon">☰</span>
        更多
      </div>
    </div>
  </div>

  <script>
    GameState.init();

    // 检查是否已登录
    if (!GameState.isPageUnlocked('others_message_list')) {
      document.body.innerHTML = '<div style="font-family:var(--font-main);color:#999;text-align:center;padding:40px;background:#1e1e2e;min-height:100vh;display:flex;align-items:center;justify-content:center;">🔒 请先登录关联QQ号</div>';
    }

    // ===== 消息列表数据 =====
    const CHAT_LIST = [
      {
        name: '谢砚亲友',
        time: '6月27日',
        preview: '亲友：看到回我一下，不管怎么样说一声',
        id: 'chatTimeFriend',
        previewId: 'chatPreviewFriend',
      },
      {
        name: '沈屿',
        time: '6月25日',
        preview: '沈屿：怎么不理我，出什么事了吗？',
        id: 'chatTime1',
        previewId: 'chatPreview1',
      },
      {
        name: '空友B',
        time: '6月10日',
        preview: '空友B：微信转账 · **雯',
        id: 'chatTimeB',
        previewId: 'chatPreviewB',
      },
      {
        isGroup: true,
        time: '6月10日',
        preview: '代发A：查。【饮血崖】三挂一铁组仅限blc……',
        id: 'groupTime',
        previewId: 'groupPreview',
      },
    ];

    function fillList(data) {
      for (const item of data) {
        if (item.isGroup) {
          document.getElementById(item.id).textContent = item.time;
          document.getElementById(item.previewId).textContent = item.preview;
        } else {
          document.getElementById(item.id).textContent = item.time;
          document.getElementById(item.previewId).textContent = item.preview;
        }
      }
    }

    fillList(CHAT_LIST);

    // ===== 搜索功能 =====
    const searchInput = document.getElementById('searchInput');
    const msgItems = document.querySelectorAll('.msg-item');

    searchInput.addEventListener('input', function() {
      const keyword = this.value.trim().toLowerCase();

      msgItems.forEach(item => {
        const text = item.textContent.toLowerCase();
        if (text.includes(keyword)) {
          item.style.display = 'flex';
        } else {
          item.style.display = 'none';
        }
      });
    });
  </script>
</body>
</html>
