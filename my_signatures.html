<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>历史个签 · 消失的对皮？</title>
  <link rel="stylesheet" href="shared/style.css">
  <script src="shared/game-state.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px 60px;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      max-width: 500px;
      width: 100%;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
      overflow: hidden;
    }

    .header {
      padding: 16px 20px;
      border-bottom: 1px solid #f0f2f5;
      display: flex;
      align-items: center;
    }

    .header .title {
      font-size: 17px;
      font-weight: 600;
      color: #1a1a1a;
    }

    /* ===== 个签列表 ===== */
    .sig-list {
      padding: 12px 20px 20px;
    }

    .sig-item {
      padding: 16px 0;
      border-bottom: 1px solid #f0f2f5;
    }

    .sig-item:last-child {
      border-bottom: none;
    }

    .sig-item .sig-text {
      font-size: 15px;
      color: #333;
      line-height: 1.6;
    }

    .sig-item .sig-time {
      font-size: 12px;
      color: #bbb;
      margin-top: 6px;
    }

    .sig-item .sig-status {
      font-size: 11px;
      color: #07C160;
      margin-top: 4px;
      font-weight: 500;
    }

    .sig-item .sig-status.old {
      color: #999;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <span class="title">📝 历史个性签名</span>
    </div>

    <div class="sig-list">
      <!-- 当前个签 -->
      <div class="sig-item">
        <div class="sig-text">我還想和你談論宇宙和天空</div>
        <div class="sig-time">2026年6月 · 当前使用</div>
        <div class="sig-status">● 使用中</div>
      </div>

      <!-- 历史个签3 -->
      <div class="sig-item">
        <div class="sig-text">夕阳掉进我心里。</div>
        <div class="sig-time">2026年2月 - 2026年3月</div>
        <div class="sig-status old">● 已更换</div>
      </div>

      <!-- 历史个签2 -->
      <div class="sig-item">
        <div class="sig-text">嘿，等我找到你，心无旁骛地相爱。</div>
        <div class="sig-time">2026年1月 - 2026年2月</div>
        <div class="sig-status old">● 已更换</div>
      </div>
    </div>
  </div>

  <script>
    GameState.init();
  </script>
</body>
</html>
