<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拉拉的QQ个人主页</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ========== Reset & Base ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 16px 60px;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ========== Profile Card ========== */
        .profile-card {
            max-width: 740px;
            width: 100%;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            transition: box-shadow 0.3s ease;
        }

        .profile-card:hover {
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.12);
        }

        /* ========== MODULE 1: Cover ========== */
        .cover-section {
            position: relative;
            width: 100%;
            height: 280px;
            background: url('https://picsum.photos/seed/qqcover/800/300') center / cover no-repeat;
        }

        .cover-section::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.45));
            pointer-events: none;
        }

        /* ========== MODULE 2: Avatar ========== */
        .avatar-wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            margin-top: -52px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid #ffffff;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
            object-fit: cover;
            background: #e8e8e8;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            cursor: pointer;
        }

        .avatar:hover {
            transform: scale(1.06);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
        }

        /* ========== MODULE 3: Core Info ========== */
        .info-section {
            text-align: center;
            padding: 14px 24px 0;
        }

        .info-name-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nickname {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .vip-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            background: linear-gradient(135deg, #f5d77b 0%, #e8b93a 100%);
            color: #7a5802;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 10px 2px 8px;
            border-radius: 12px;
            letter-spacing: 0.3px;
        }
        .vip-badge i { font-size: 10px; }

        .level-badge {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            background: #f0f2f5;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            color: #666;
        }
        .level-badge .lv-dot {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
        }
        .lv-dot.lv-s { background: #45b7d1; }
        .lv-dot.lv-m { background: #f0ad4e; }
        .lv-dot.lv-sun { background: #d9534f; }

        .qq-number {
            font-size: 13px;
            color: #999;
            margin-top: 4px;
        }
        .qq-number i {
            margin-right: 4px;
            color: #bbb;
        }

        /* ========== MODULE 4: Signature ========== */
        .signature-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
            padding: 0 24px;
        }

        .signature-text {
            font-size: 14px;
            color: #666;
            position: relative;
            padding: 0 4px;
        }
        .signature-text::before {
            content: '「';
            color: #ccc;
            font-size: 16px;
        }
        .signature-text::after {
            content: '」';
            color: #ccc;
            font-size: 16px;
        }

        .signature-edit {
            font-size: 12px;
            color: #bbb;
            cursor: pointer;
            transition: color 0.2s;
        }
        .signature-edit:hover { color: #07C160; }

        /* ========== MODULE 5: Stats ========== */
        .stats-section {
            display: flex;
            justify-content: center;
            gap: 0;
            margin: 16px 24px 0;
            padding: 14px 0;
            border-top: 1px solid #f0f2f5;
            border-bottom: 1px solid #f0f2f5;
        }

        .stat-item {
            flex: 1;
            text-align: center;
            position: relative;
            cursor: pointer;
        }
        .stat-item + .stat-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 10%;
            height: 80%;
            width: 1px;
            background: #f0f2f5;
        }

        .stat-number {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
        }
        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }

        .stat-item:hover .stat-number {
            color: #07C160;
        }

        /* ========== MODULE 6: Detail Info ========== */
        .detail-section {
            padding: 16px 24px 0;
        }

        .detail-section-title {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 12px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 16px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #555;
            padding: 6px 0;
        }

        .detail-item i {
            width: 16px;
            color: #bbb;
            font-size: 13px;
            text-align: center;
        }
        .detail-item .label {
            color: #999;
            flex-shrink: 0;
        }
        .detail-item .value {
            color: #333;
        }

        /* Tags (hobbies) */
        .tags-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
            padding-bottom: 16px;
            border-bottom: 1px solid #f0f2f5;
        }
        .tag {
            display: inline-block;
            background: #f0f8f4;
            color: #07C160;
            font-size: 12px;
            padding: 3px 12px;
            border-radius: 20px;
            font-weight: 500;
        }

        /* ========== MODULE 7: Medals ========== */
        .medal-section {
            padding: 16px 24px 0;
        }

        .medal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .medal-header h3 {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
        }
        .medal-header a {
            font-size: 12px;
            color: #07C160;
            text-decoration: none;
        }

        .medal-list {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            padding-bottom: 16px;
            border-bottom: 1px solid #f0f2f5;
        }

        .medal {
            position: relative;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 18px;
            cursor: default;
            transition: transform 0.2s;
        }
        .medal:hover {
            transform: scale(1.12);
        }

        .medal[data-tip]:hover::after {
            content: attr(data-tip);
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.78);
            color: #fff;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 6px;
            white-space: nowrap;
            z-index: 10;
            pointer-events: none;
        }

        /* ========== MODULE 8: Space Button ========== */
        .space-btn-section {
            padding: 16px 24px 24px;
        }

        .space-btn {
            display: block;
            width: 100%;
            padding: 12px 0;
            background: #07C160;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 0.5px;
        }
        .space-btn i {
            margin-right: 6px;
        }
        .space-btn:hover {
            background: #06ad56;
        }
        .space-btn:active {
            transform: scale(0.97);
        }

        /* ========== Responsive ========== */
        @media (max-width: 768px) {
            body { padding: 20px 12px 40px; }
            .cover-section { height: 220px; }
            .avatar { width: 88px; height: 88px; border-width: 3px; }
            .avatar-wrapper { margin-top: -46px; }
            .detail-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 480px) {
            body { padding: 0 0 30px; }
            .profile-card { border-radius: 0; }
            .cover-section { height: 180px; }
            .avatar { width: 76px; height: 76px; }
            .avatar-wrapper { margin-top: -40px; }
            .info-section { padding: 10px 16px 0; }
            .signature-section { padding: 0 16px; }
            .stats-section { margin: 12px 16px 0; padding: 12px 0; }
            .detail-section { padding: 12px 16px 0; }
            .medal-section { padding: 12px 16px 0; }
            .space-btn-section { padding: 12px 16px 20px; }
            .nickname { font-size: 19px; }
        }
    </style>
</head>
<body>

    <div class="profile-card">

        <!-- MODULE 1: Cover -->
        <div class="cover-section"></div>

        <!-- MODULE 2: Avatar -->
        <div class="avatar-wrapper">
            <img class="avatar"
                 src="https://cataas.com/cat?width=200&height=200"
                 alt="拉拉的猫头像"
                 id="avatarImg"
                 onerror="this.onerror=null; this.src='https://placekitten.com/200/200';
                          this.onerror=function(){ this.style.display='none'; document.getElementById('avatarFallback').style.display='flex'; }">
            <div id="avatarFallback"
                 style="display:none; width:100px; height:100px; border-radius:50%; border:4px solid #fff; background:#e0e0e0; align-items:center; justify-content:center; font-size:36px; color:#999;">
                <i class="fas fa-cat"></i>
            </div>
        </div>

        <!-- MODULE 3: Core Info -->
        <div class="info-section">
            <div class="info-name-row">
                <span class="nickname">拉拉</span>
                <span class="vip-badge"><i class="fas fa-crown"></i> VIP6</span>
                <span class="level-badge">
                    <span class="lv-dot lv-sun"></span>
                    <span class="lv-dot lv-sun"></span>
                    <span class="lv-dot lv-m"></span>
                    <span class="lv-dot lv-s"></span>
                    <span style="margin-left:4px;">LV.72</span>
                </span>
            </div>
            <div class="qq-number">
                <i class="far fa-comment-dots"></i> QQ：1234567890
            </div>
        </div>

        <!-- MODULE 4: Signature -->
        <div class="signature-section">
            <span class="signature-text">今天也要开心鸭~</span>
            <span class="signature-edit"><i class="fas fa-pen"></i></span>
        </div>

        <!-- MODULE 5: Stats -->
        <div class="stats-section">
            <div class="stat-item">
                <div class="stat-number">23,567</div>
                <div class="stat-label">空间访问</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">1,888</div>
                <div class="stat-label">获赞</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">327</div>
                <div class="stat-label">好友</div>
            </div>
        </div>

        <!-- MODULE 6: Detail Info -->
        <div class="detail-section">
            <div class="detail-section-title">详细资料</div>
            <div class="detail-grid">
                <div class="detail-item">
                    <i class="fas fa-venus-mars"></i>
                    <span class="label">性别</span>
                    <span class="value">女</span>
                </div>
                <div class="detail-item">
                    <i class="fas fa-cake-candles"></i>
                    <span class="label">生日</span>
                    <span class="value">06月15日</span>
                </div>
                <div class="detail-item">
                    <i class="fas fa-calendar"></i>
                    <span class="label">年龄</span>
                    <span class="value">永远18岁</span>
                </div>
                <div class="detail-item">
                    <i class="fas fa-location-dot"></i>
                    <span class="label">所在地</span>
                    <span class="value">浙江 · 杭州</span>
                </div>
                <div class="detail-item">
                    <i class="fas fa-briefcase"></i>
                    <span class="label">职业</span>
                    <span class="value">设计师</span>
                </div>
                <div class="detail-item">
                    <i class="fas fa-graduation-cap"></i>
                    <span class="label">学校</span>
                    <span class="value">浙江大学</span>
                </div>
            </div>

            <div class="tags-row">
                <span class="tag"><i class="fas fa-music"></i> 音乐</span>
                <span class="tag"><i class="fas fa-camera"></i> 摄影</span>
                <span class="tag"><i class="fas fa-paw"></i> 猫咪</span>
                <span class="tag"><i class="fas fa-paint-brush"></i> 画画</span>
                <span class="tag"><i class="fas fa-coffee"></i> 咖啡</span>
            </div>
        </div>

        <!-- MODULE 7: Medals -->
        <div class="medal-section">
            <div class="medal-header">
                <h3>🏅 TA的勋章</h3>
                <a href="#">查看全部 <i class="fas fa-angle-right"></i></a>
            </div>
            <div class="medal-list">
                <div class="medal" data-tip="活跃达人"><i class="fas fa-fire" style="color:#e67e22;"></i></div>
                <div class="medal" data-tip="空间红人"><i class="fas fa-star" style="color:#f1c40f;"></i></div>
                <div class="medal" data-tip="摄影大师"><i class="fas fa-camera" style="color:#2ecc71;"></i></div>
                <div class="medal" data-tip="签到王者"><i class="fas fa-calendar-check" style="color:#3498db;"></i></div>
                <div class="medal" data-tip="年度会员"><i class="fas fa-crown" style="color:#e8b93a;"></i></div>
                <div class="medal" data-tip="社交达人"><i class="fas fa-heart" style="color:#e74c3c;"></i></div>
            </div>
        </div>

        <!-- MODULE 8: Space Button -->
        <div class="space-btn-section">
            <button class="space-btn" onclick="alert('✨ 正在前往拉拉的QQ空间…')">
                <i class="fas fa-paper-plane"></i> 访问TA的QQ空间
            </button>
        </div>

    </div>

    <script>
        // 图片错误兜底（外层 onerror 已处理，这里做额外保障）
        document.getElementById('avatarImg').addEventListener('error', function(e) {
            var fb = document.getElementById('avatarFallback');
            if (fb && this.style.display !== 'none') {
                this.style.display = 'none';
                fb.style.display = 'flex';
            }
        });
    </script>

</body>
</html>
