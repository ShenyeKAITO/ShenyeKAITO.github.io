<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>谢砚亲友 · 消失的对皮？</title>
  <link rel="stylesheet" href="shared/style.css">
  <script src="shared/game-state.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #1e1e2e;
      font-family: var(--font-main);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .window-frame {
      width: 100%;
      max-width: 820px;
      height: 100vh;
      max-height: 720px;
      background: #f5f5f5;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 60px rgba(0,0,0,0.5);
    }
    .window-titlebar {
      background: #e6e6e6;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      user-select: none;
      border-bottom: 1px solid #d0d0d0;
    }
    .window-titlebar .title-text { font-size:13px; color:#444; font-weight:500; }
    .window-titlebar .win-controls { display:flex; gap:6px; }
    .window-titlebar .win-controls span { width:12px; height:12px; border-radius:50%; display:inline-block; }
    .win-controls .btn-close { background:#e94560; }
    .win-controls .btn-min { background:#f0c040; }
    .win-controls .btn-max { background:#60c060; }
    .chat-body { display:flex; flex:1; overflow:hidden; }
    .side-panel {
      width:160px; background:#e8e8e8; border-right:1px solid #d0d0d0;
      display:flex; flex-direction:column; padding:20px 12px; flex-shrink:0;
    }
    .side-panel .big-avatar {
      width:64px; height:64px; border-radius:50%; flex-shrink:0;
      margin:0 auto 12px;
      background:#002FA7;
    }
    .side-panel .side-name { text-align:center; font-size:16px; font-weight:600; color:#333; margin-bottom:4px; }
    .side-panel .side-status { text-align:center; font-size:12px; color:#999; margin-bottom:16px; }
    .side-panel .side-info {
      font-size:12px; color:#888; line-height:1.8;
      padding:12px 0; border-top:1px solid #d0d0d0;
    }
    .chat-main { flex:1; display:flex; flex-direction:column; min-width:0; }
    .chat-header {
      background:#fff; padding:10px 16px; display:flex; align-items:center;
      border-bottom:1px solid #e0e0e0; flex-shrink:0;
    }
    .chat-header .name-title { font-size:14px; font-weight:600; color:#333; }
    .chat-header .menu-btn { font-size:16px; color:#333; cursor:pointer; padding:4px; margin-left:auto; }
    .chat-area {
      flex:1; overflow-y:auto; padding:16px 20px; background:#f0f0f0; display:flex; flex-direction:column;
    }
    .message-row {
      display:flex; margin-bottom:14px; animation:msgIn 0.3s ease-out; max-width:100%;
    }
    @keyframes msgIn {
      from { opacity:0; transform:translateY(8px); }
      to { opacity:1; transform:translateY(0); }
    }
    .message-row.received { justify-content:flex-start; }
    .message-row.sent { justify-content:flex-end; }
    .msg-avatar {
      width:36px; height:36px; border-radius:50%; flex-shrink:0;
      background-size:cover; background-position:center; background-repeat:no-repeat;
    }
    .msg-avatar.friend-av { background:#002FA7; }
    .msg-avatar.my-avatar { background-image:url('shared/my-avatar.jpg'); }
    .message-row.received .msg-avatar { margin-right:8px; }
    .message-row.sent .msg-avatar { margin-left:8px; order:1; }
    .msg-content { display:flex; flex-direction:column; max-width:75%; }
    .message-row.sent .msg-content { align-items:flex-end; }
    .message-row.received .msg-content { align-items:flex-start; }
    .bubble {
      padding:10px 16px; border-radius:16px; font-size:15px;
      line-height:1.6; word-break:break-word; position:relative;
    }
    .message-row.received .bubble { background:#fff; color:#333; border-bottom-left-radius:4px; }
    .message-row.sent .bubble { background:#c6e6f7; color:#333; border-bottom-right-radius:4px; }
    .date-label {
      text-align:center; font-size:12px; color:#b0b0b0; margin:12px 0;
    }
    .date-label span {
      background:#e8e8e8; padding:3px 14px; border-radius:10px; font-size:11px;
    }
    .chat-input-bar {
      background:#fff; border-top:1px solid #e0e0e0; padding:10px 16px;
      flex-shrink:0; display:flex; align-items:center; gap:10px;
    }
    .chat-input-bar input {
      flex:1; padding:10px 16px; border:1px solid #d0d0d0; border-radius:20px;
      font-size:14px; font-family:var(--font-main); outline:none; background:#f8f8f8;
    }
    .chat-input-bar input::placeholder { color:#bbb; }
    .chat-input-bar .send-btn {
      padding:8px 22px; background:#ddd; color:#fff; border:none;
      border-radius:20px; font-size:14px; font-family:var(--font-main); cursor:not-allowed;
    }
  </style>
</head>
<body>
  <div class="window-frame">
    <div class="window-titlebar">
      <span class="title-text">💬 与 谢砚亲友 的对话</span>
      <span class="win-controls">
        <span class="btn-min"></span>
        <span class="btn-max"></span>
        <span class="btn-close" onclick="window.close()"></span>
      </span>
    </div>
    <div class="chat-body">
      <div class="side-panel">
        <div class="big-avatar"></div>
        <div class="side-name">谢砚亲友</div>
        <div class="side-status">在线</div>
        <div class="side-info">
          <div>个性签名：今天天气真好，适合睡觉</div>
        </div>
      </div>
      <div class="chat-main">
        <div class="chat-header">
          <span class="name-title">谢砚亲友</span>
          <span class="menu-btn">⋯</span>
        </div>
        <div class="chat-area" id="chatArea">
          <!-- 日期 -->
          <div class="date-label"><span>6月27日</span></div>

          <!-- 我 -->
          <div class="message-row sent">
            <div class="msg-content">
              <div class="bubble">在吗？想问一下你知不知道谢砚去哪了</div>
            </div>
            <div class="msg-avatar my-avatar"></div>
          </div>

          <!-- 亲友 -->
          <div class="message-row received">
            <div class="msg-avatar friend-av"></div>
            <div class="msg-content">
              <div class="bubble">啊？谢砚？我也好几天联系不上她了</div>
            </div>
          </div>

          <!-- 我 -->
          <div class="message-row sent">
            <div class="msg-content">
              <div class="bubble">她是不是出什么事了……你知不知道她家在哪之类的</div>
            </div>
            <div class="msg-avatar my-avatar"></div>
          </div>

          <!-- 亲友 -->
          <div class="message-row received">
            <div class="msg-avatar friend-av"></div>
            <div class="msg-content">
              <div class="bubble">我只知道她好像在海城上班，具体哪家公司的我也不太清楚😥</div>
            </div>
          </div>

          <!-- 我 -->
          <div class="message-row sent">
            <div class="msg-content">
              <div class="bubble">好吧……那你有她其他联系方式吗？</div>
            </div>
            <div class="msg-avatar my-avatar"></div>
          </div>

          <!-- 亲友 -->
          <div class="message-row received">
            <div class="msg-avatar friend-av"></div>
            <div class="msg-content">
              <div class="bubble">我们也不太熟，我也6月才认识她</div>
            </div>
          </div>

          <!-- 我 -->
          <div class="message-row sent">
            <div class="msg-content">
              <div class="bubble">好，这样啊。谢谢你</div>
            </div>
            <div class="msg-avatar my-avatar"></div>
          </div>
        </div>

        <div class="chat-input-bar">
          <input type="text" id="chatInput" placeholder="输入消息..." autocomplete="off">
          <button class="send-btn" id="sendBtn" disabled>发送</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    GameState.init();
    const sendBtn = document.getElementById('sendBtn');
    sendBtn.addEventListener('click', function(e) { e.preventDefault(); });
    document.getElementById('chatInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') e.preventDefault();
    });
  </script>
</body>
</html>
